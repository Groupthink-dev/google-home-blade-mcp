name: google-home-blade-mcp
version: "0.1.1"
description: "Google Home / Nest device control via SDM API — thermostats, cameras, doorbells, event streams"
author: piersdd
licence: MIT
tier: certified
author_type: first-party
readiness: production
homepage: https://github.com/groupthink-dev/google-home-blade-mcp
contract: home-v1

services:
  home:
    devices: ghome_devices
    device_detail: ghome_device
    structures: ghome_structures
    rooms: ghome_rooms
    status: ghome_status
    thermostat_mode: ghome_thermostat_mode
    thermostat_setpoint: ghome_thermostat_setpoint
    thermostat_eco: ghome_thermostat_eco
    fan_set: ghome_fan_set
    camera_stream: ghome_camera_stream
    camera_image: ghome_camera_image
    events: ghome_events
    command: ghome_command
    thermostats: ghome_thermostats

install:
  runtime: uv
  package: google-home-blade-mcp
  command: google-home-blade-mcp

env:
  - name: GOOGLE_HOME_CLIENT_ID
    description: "OAuth2 client ID from Google Cloud Console"
  - name: GOOGLE_HOME_CLIENT_SECRET
    description: "OAuth2 client secret"
    secret: true
  - name: GOOGLE_HOME_REFRESH_TOKEN
    description: "OAuth2 refresh token (from make auth)"
    secret: true
  - name: GOOGLE_HOME_PROJECT_ID
    description: "Project ID from Device Access Console"
  - name: GOOGLE_HOME_WRITE_ENABLED
    description: "Enable device commands (thermostat, camera, fan)"
    default: "false"
  - name: GOOGLE_HOME_PUBSUB_SUBSCRIPTION
    description: "Pub/Sub subscription for device events (optional)"

setup:
  icon: "\U0001F3E0"
  blurb: "Control Google Home / Nest devices — thermostats, cameras, doorbells, and event streams via the SDM API."
  auth_model: oauth2
  complexity: involved
  fields:
    - key: GOOGLE_HOME_CLIENT_ID
      label: "OAuth2 Client ID"
      secret: false
      required: true
      placeholder: "123456789-xxx.apps.googleusercontent.com"
    - key: GOOGLE_HOME_CLIENT_SECRET
      label: "OAuth2 Client Secret"
      secret: true
      required: true
    - key: GOOGLE_HOME_REFRESH_TOKEN
      label: "Refresh Token"
      secret: true
      required: true
      help: "Run 'make auth' to complete the OAuth flow and obtain this token"
    - key: GOOGLE_HOME_PROJECT_ID
      label: "Device Access Project ID"
      secret: false
      required: true
      placeholder: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    - key: GOOGLE_HOME_PUBSUB_SUBSCRIPTION
      label: "Pub/Sub Subscription"
      secret: false
      required: false
      placeholder: "projects/my-project/subscriptions/nest-events"
      help: "For event-driven triggers. Create in GCP Console → Pub/Sub"
    - key: GOOGLE_HOME_WRITE_ENABLED
      label: "Enable device commands"
      type: boolean
      secret: false
      required: false
      help: "Enables thermostat, camera, and fan control commands"
  oauth2:
    grant_type: authorization_code
    scopes:
      - "https://www.googleapis.com/auth/sdm.service"
    setup_url: "https://nestservices.google.com/partnerconnections"
  prerequisites:
    - "Google Cloud project with SDM API enabled"
    - "Device Access Console registration ($5 USD one-time)"
    - "OAuth 2.0 credentials (Web application type)"
  test:
    endpoint: "https://smartdevicemanagement.googleapis.com/v1/enterprises/{project_id}/devices"
    auth_style: bearer
    auth_header: Authorization
  help:
    - label: "Device Access Console"
      url: "https://console.nest.google.com/device-access"
    - label: "SDM API Documentation"
      url: "https://developers.google.com/nest/device-access/api"
    - label: "GCP Console"
      url: "https://console.cloud.google.com/"

requires:
  sidereal: ">=0.3.0"

conformance:
  required: "4/4"
  recommended: "5/5"
  optional: "5/5"
  last_tested: "2026-04-03"
